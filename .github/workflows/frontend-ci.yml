name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Typecheck and Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Tests
        run: npx vitest run
