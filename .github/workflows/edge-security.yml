name: Edge Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit-edge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Get changed Edge files
        id: files
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          # Robustly find changed .ts files under supabase/functions
          # Using || true to prevent grep from failing the step if no files match
          RAW_FILES=$(git diff --name-only origin/main...HEAD | grep '^supabase/functions/.*\.ts$' || true)
          # Clean up: join into comma-separated list
          CSV_PATHS=$(echo "$RAW_FILES" | tr '\n' ',' | sed 's/,$//' | sed 's/^,//')
          echo "paths=$CSV_PATHS" >> $GITHUB_OUTPUT
          
      - name: Verify Environment
        run: |
          echo "Changed files detected: ${{ steps.files.outputs.paths }}"
          [ -z "${{ steps.files.outputs.paths }}" ] && echo "Notice: No Edge functions identified for focused audit."

      - name: Run Edge Security Audit
        env:
          EDGE_AUDIT_PATHS: ${{ steps.files.outputs.paths }}
        run: npm run audit:edge
        
      - name: Run Lint
        run: npm run lint
        
      - name: Run Tests
        run: npm test
