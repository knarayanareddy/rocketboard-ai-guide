name: Edge Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-edge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Get changed Edge files
        id: files
        if: github.event_name == 'pull_request'
        run: |
          # Compute changed .ts files in supabase/functions compared to main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep '^supabase/functions/.*\.ts$' | tr '\n' ',' | sed 's/,$//')
          echo "paths=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Run Edge Security Audit
        env:
          EDGE_AUDIT_PATHS: ${{ steps.files.outputs.paths }}
        run: npm run audit:edge
        
      - name: Run Lint
        run: npm run lint
        
      - name: Run Tests
        run: npm test
