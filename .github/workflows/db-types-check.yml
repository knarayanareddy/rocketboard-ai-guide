name: Database Type Safety Check
on:
  pull_request:
      branches: [main, develop]
          paths:
                - 'supabase/migrations/**'
                      - 'src/integrations/supabase/types.ts'
                            - 'scripts/check_types_tables.ts'
                            jobs:
                              check-types:
                                  runs-on: ubuntu-latest
                                      steps:
                                            - uses: actions/checkout@v4
                                                  - name: Setup Node.js
                                                          uses: actions/setup-node@v4
                                                                  with:
                                                                            node-version: '20'
                                                                                      cache: 'npm'
                                                                                            - name: Install dependencies
                                                                                                    run: npm ci
                                                                                                          - name: Setup Supabase CLI
                                                                                                                  uses: supabase/setup-cli@v1
                                                                                                                        - name: Start Supabase
                                                                                                                                run: supabase start --ignore-health-check
                                                                                                                                      - name: Assert DB Readiness
                                                                                                                                              run: npx supabase db query --sql "select 1 as ok;"
                                                                                                                                                    - name: Reset Database and Check Types
                                                                                                                                                            run: |
                                                                                                                                                                      supabase db reset
                                                                                                                                                                                npm run check:types
                                                                                                                                                                                
